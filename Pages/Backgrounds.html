<!DOCTYPE html>
<html>
<head>
<script>
const REPO = "lainchan/lainchan";
const BRANCH = "main";
const FOLDER = "walls";

fetch(`https://api.github.com/repos/${REPO}/contents/${FOLDER}?ref=${BRANCH}`)
  .then(r => r.json())
  .then(files => {
    const images = files.filter(f => /\.(jpg|jpeg|png|gif|webp)$/i.test(f.name));
    const random = images[Math.floor(Math.random() * images.length)];
    window.location.replace(random.download_url);
  });
</script>
</head>
</html>
